<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASD MRI Diagnostic Tool</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>

        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background: rgba(255,255,255,0.07);
            padding:40px;
            border-radius:12px;
            width:420px;
            text-align:center;
            box-shadow:0 20px 40px rgba(0,0,0,0.5);
        }

        h1{
            margin-bottom:10px;
        }

        p{
            color:#ccc;
            font-size:14px;
        }

        input[type=file]{
            margin-top:20px;
            margin-bottom:20px;
            width:100%;
            padding:10px;
            background:#111;
            border:1px solid #555;
            color:white;
            border-radius:6px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#00c6ff;
            background:linear-gradient(90deg,#00c6ff,#0072ff);
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            opacity:0.9;
        }

        .result{
            margin-top:25px;
            padding:15px;
            border-radius:8px;
            background:rgba(0,0,0,0.4);
        }

        .error{
            margin-top:20px;
            color:#ff6b6b;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>🧠 ASD MRI Diagnosis</h1>
    <p>Upload Brain MRI (Image / .nii / .mgz)</p>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file"
               accept=".png,.jpg,.jpeg,.nii,.mgz"
               required>

        <button type="submit">Run Diagnosis</button>
    </form>

    {% if prediction %}
    <div class="result">
        <h2>Prediction : {{ prediction }}</h2>
        <p>Confidence : {{ "%.4f"|format(probability) }}</p>
    </div>
    {% endif %}

    {% if error %}
    <div class="error">
        {{ error }}
    </div>
    {% endif %}

</div>

</body>
</html>
