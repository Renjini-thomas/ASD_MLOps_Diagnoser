<!DOCTYPE html>
<html>
<head>

<title>ASD MRI Diagnoser</title>

<style>

body{
font-family: Arial;
text-align:center;
margin-top:100px;
}

.upload-box{
border:2px dashed #aaa;
padding:30px;
width:400px;
margin:auto;
}

button{
padding:10px 20px;
margin-top:10px;
}

.result{
margin-top:30px;
font-size:20px;
}

</style>

</head>

<body>

<h2>Autism Spectrum Disorder Diagnoser</h2>

<form method="POST" enctype="multipart/form-data">

<div class="upload-box">

<input type="file" name="file" required>

<br><br>

<button type="submit">Predict</button>

</div>

</form>

{% if prediction %}

<div class="result">

<h3>Prediction: {{ prediction }}</h3>

<p>Confidence: {{ probability }}</p>

</div>

{% endif %}

</body>
</html>
